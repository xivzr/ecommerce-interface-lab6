<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
  <title>Olevs Minimal Watch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Olevs Watch</h1>
</header>

<main>

  <section>
    <img src="Minimal Watch 1.jpg" alt="Olevs minimal watch" width="150">
    <p class="price">958</p>
    <p>Elegant design with premium materials.</p>
  </section>

  <section>
    <h2>Specifications</h2>
<div class="table-container">
<table>
      <tr>
        <th>Feature</th>
        <th>Details</th>
      </tr>
      <tr>
        <td>Water Resistant</td>
        <td>4 ATM</td>
      </tr>
      <tr>
        <td>Material</td>
        <td>Stainless Steel</td>
      </tr>
      <tr>
        <td>Movement</td>
        <td>Quartz</td>
      </tr>
    </table>
</div>
   
  </section>

  <section>
    <h2>Add to Cart</h2>

    <form>
      <label for="qty">Quantity:</label>
      <input type="number" id="qty" name="qty" min="1" value="1">
      <button type="submit">Add to Cart</button>
    </form>
  </section>

  <section>
    <h2>User Reviews</h2>

    <article>
      <blockquote>Very aesthetic guys!</blockquote>
      <p>- Xavier.</p>
    </article>

    <article>
      <blockquote>Perfect for daily wear. Kavouge!</blockquote>
      <p>- Maby B.</p>
    </article>
  </section>

</main>
<script src="script.js"></script>

</body>
</html>
